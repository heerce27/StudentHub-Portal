<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>StudentHub - Register</title>
</head>

<body>

    <!-- Header -->
    <header style="display: flex; justify-content: space-between; align-items: center; padding: 10px;">

        <h2 style="color: darkblue; margin:0;">StudentHub</h2>

        <nav>
            <a href="login.html"><button>Login</button></a>
            <a href="register.html"><button>Register</button></a>
        </nav>

    </header>

    <hr>

    <h1 style="text-align:center;">Student Registration</h1>

    <div style="width:350px; margin:auto; border:1px solid lightgray; padding:20px; border-radius:8px;">

        <form>

            <label>Full Name</label><br>
            <input type="text" placeholder="Enter Full Name" style="width:95%;"><br><br>

            <label>Student ID</label><br>
            <input type="text" placeholder="Enter Student ID" style="width:95%;"><br><br>

            <label>Department</label><br>
            <input type="text" placeholder="Enter Department" style="width:95%;"><br><br>

            <label>Password</label><br>
            <input type="password" placeholder="Create Password" style="width:95%;"><br><br>

            <label>Confirm Password</label><br>
            <input type="password" placeholder="Confirm Password" style="width:95%;"><br><br>

            <div style="text-align:center;">
                <button type="submit">Register</button>
                <button type="reset">Clear</button>
            </div>

        </form>

        <br>

        <p style="text-align:center;">
            Already have an account?
            <a href="login.html">Login Here</a>
        </p>

    </div>

    <hr>

    <footer>
        <p style="text-align:center;">© 2026 StudentHub. All Rights Reserved.</p>
    </footer>

</body>
</html>
